services:

  backend-p2:
    image: mohsinbehzad143/todo-backend:latest
    container_name: todo-backend-p2
    volumes:
      - ./Backend:/app
    command: sh -c "rm -rf node_modules && npm install && node index.js"
    environment:
      - MONGODB_URI=mongodb+srv://todo_admin:8DsOp0apEbGBTOq0@cluster0.ym7jtyv.mongodb.net/tododb?retryWrites=true&w=majority
      - PORT=4002
    networks:
      - todo-net-p2
    restart: unless-stopped

  frontend-p2:
    image: mohsinbehzad143/todo-frontend:latest
    container_name: todo-frontend-p2
    volumes:
      - ./Frontend:/app
    command: sh -c "rm -rf node_modules && npm install && npm run dev"
    depends_on:
      - backend-p2
    networks:
      - todo-net-p2
    restart: unless-stopped

  nginx-p2:
    image: nginx:alpine
    container_name: todo-nginx-p2
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.part2.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-p2
      - frontend-p2
    networks:
      - todo-net-p2
    restart: unless-stopped

networks:
  todo-net-p2:
    driver: bridge
