version: '3.8'

services:

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build: ./Backend
    container_name: todo-backend
    ports:
      - "4002:4002"
    environment:
      - MONGODB_URI=mongodb+srv://todo_admin:8DsOp0apEbGBTOq0@cluster0.ym7jtyv.mongodb.net/?appName=Cluster0
      - PORT=4002
    networks:
      - todo-net
    restart: unless-stopped

  # ── Frontend (React/Vite) ─────────────────────────────────────
  frontend:
    build: ./Frontend
    container_name: todo-frontend
    ports:
      - "5174:5174"
    depends_on:
      - backend
    networks:
      - todo-net
    restart: unless-stopped

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - todo-net
    restart: unless-stopped

networks:
  todo-net:
    driver: bridge
